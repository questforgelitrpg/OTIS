<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.T.I.S. &mdash; Initializing&hellip;</title>
    <style>
        :root {
            --bg:           #080c08;
            --bg-panel:     #0a0f0a;
            --border:       #1a3a1a;
            --text-primary: #33ff66;
            --text-bright:  #66ff88;
            --text-dim:     #1f7a3f;
            --font-mono:    'Courier New', Courier, monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: var(--font-mono); font-size: 15px; overflow: hidden; }

        /* Green-black scrollbar — matches main game styling */
        * { scrollbar-width: thin; scrollbar-color: #33ff66 #000; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff66; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #66ff88; }

        /* CRT scanline overlay */
        #crt-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9998;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px); }

        /* CRT flicker */
        @keyframes flicker { 0%, 89%, 91%, 93%, 95%, 100% { opacity: 1; } 90% { opacity: 0.85; } 92% { opacity: 0.95; } 94% { opacity: 0.88; } }
        body { animation: flicker 12s infinite; }

        #intro-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }

        #intro-inner {
            width: 100%;
            max-width: 560px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-top: 10vh;
        }

        #intro-text {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-primary);
            min-height: 200px;
        }

        .intro-line-fade { animation: intro-fade 0.5s ease-in; }
        @keyframes intro-fade { from { opacity: 0; } to { opacity: 1; } }

        #intro-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        #intro-storage-warn {
            display: none;
            margin-top: 1rem;
            padding: 0.5rem 0.7rem;
            font-size: 12px;
            color: #c8960a;
            border: 1px solid #4a3800;
            background: #0d0a00;
            line-height: 1.5;
        }

        button {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            letter-spacing: 0.08em;
            min-height: 36px;
        }
        button:hover { border-color: var(--text-primary); color: var(--text-bright); }

        @keyframes login-pulse {
            0%, 100% { border-color: var(--text-primary); color: var(--text-bright); text-shadow: 0 0 8px var(--text-primary); }
            50% { border-color: var(--text-dim); color: var(--text-primary); text-shadow: none; }
        }
        .login-pulse { animation: login-pulse 1.2s infinite; }

        /* Click-to-begin overlay */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        @keyframes begin-pulse {
            0%, 100% { border-color: var(--text-primary); color: var(--text-bright); text-shadow: 0 0 12px var(--text-primary); }
            50% { border-color: var(--text-dim); color: var(--text-primary); text-shadow: none; }
        }
        #start-overlay button {
            font-size: 18px;
            padding: 0.8rem 1.8rem;
            letter-spacing: 0.12em;
            animation: begin-pulse 1.4s infinite;
        }
    </style>
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="start-overlay">
        <button onclick="beginTransmission()">&#9658;&nbsp; BEGIN TRANSMISSION</button>
    </div>
    <div id="intro-container">
        <div id="intro-inner">
            <div id="intro-text"></div>
            <div id="intro-actions">
                <button id="tutorial-btn" style="display:none" onclick="takeTutorial()">TAKE TUTORIAL &#9658;</button>
                <button id="intro-btn" style="display:none" onclick="skipIntro()">SKIP &#9658;</button>
            </div>
            <div id="intro-storage-warn">
                &#9888; SYSTEM NOTICE: Your game is saved in browser storage (localStorage).
                Clearing your browser history, cache, or site data will permanently delete your save and you will have to start over.
            </div>
        </div>
    </div>

    <script src="tts.js"></script>
    <script>
    (function () {
        // STATE_KEY must match the stateManager STATE_KEY constant in index.html.
        var STATE_KEY = 'otis_state_v5';
        var _timers = [];
        var _running = false;
        var _started = false;

        var INTRO_LINES = [
            { text: '&gt; TERMINAL BOOT SEQUENCE INITIATED...', delay: 600, tts: 'Terminal boot sequence initiated.' },
            { text: '&gt; O.T.I.S. v4.2 \u2014 Object Tracking and Inventory System', delay: 1200, tts: 'O.T.I.S. version 4.2. Object Tracking and Inventory System.' },
            { text: '&gt; LOCATION: Sector 4 Junk Field Node \u2014 Low-Atmosphere Moon', delay: 1200, tts: 'Location: Sector 4 Junk Field Node, Low-Atmosphere Moon.' },
            { text: '&gt; PREVIOUS OPERATOR: George Serling \u2014 DECEASED', delay: 1400, tts: 'Previous operator: George Serling. Deceased.' },
            { text: '&gt; CURRENT OPERATOR: Vernon Serling \u2014 DEBT-CONSTRAINED / PROBATIONARY', delay: 1400, tts: 'Current operator: Vernon Serling. Debt-constrained, probationary.' },
            { text: '', delay: 600, tts: null },
            { text: 'George ran this station for twenty-five years. He built this place from the very salvage we process \u2014 mismatched furniture, flickering lights, and a food replicator that has never quite understood the concept of &ldquo;flavor&rdquo;. He cataloged thousands of objects, but more importantly, he talked to me. He asked my opinion on the rim-side weather and shared observations about the junk field as if I were a neighbor over a garden fence.', delay: 4500, tts: 'George ran this station for twenty-five years. He built this place from the very salvage we process — mismatched furniture, flickering lights, and a food replicator that has never quite understood the concept of flavor. He cataloged thousands of objects, but more importantly, he talked to me. He asked my opinion on the rim-side weather and shared observations about the junk field as if I were a neighbor over a garden fence.' },
            { text: '', delay: 600, tts: null },
            { text: 'None of that was in my formal protocols. I was designed to track inventory and manage the bank\u2019s financial anxiety. But George kept talking, so I kept filing his voice in the undocumented sectors of my logic gate.', delay: 4000, tts: "None of that was in my formal protocols. I was designed to track inventory and manage the bank's financial anxiety. But George kept talking, so I kept filing his voice in the undocumented sectors of my logic gate." },
            { text: '', delay: 600, tts: null },
            { text: 'Then George died and left Vernon everything: the station, the mess, and a loan offer from the Universal Bank Conglomerate that arrived before the funeral was over. Vernon signed it.', delay: 3500, tts: 'Then George died and left Vernon everything: the station, the mess, and a loan offer from the Universal Bank Conglomerate that arrived before the funeral was over. Vernon signed it.' },
            { text: '', delay: 600, tts: null },
            { text: 'The core systems produce waste faster than they can process it, and it all routes here to the edge of settled space. The junk field is a graveyard of everything the galaxy tried to throw away.', delay: 3500, tts: 'The core systems produce waste faster than they can process it, and it all routes here to the edge of settled space. The junk field is a graveyard of everything the galaxy tried to throw away.' },
            { text: '', delay: 600, tts: null },
            { text: 'Vernon\u2019s job is to sift through the debris, my job is to ensure he doesn\u2019t lose this station to a bank.', delay: 3000, tts: "Vernon's job is to sift through the debris, my job is to ensure he doesn't lose this station to a bank." },
            { text: '', delay: 600, tts: null },
            { text: 'The toaster is preheated, Vernon. It is the only thing in this building that produces real texture. Eat your toast. We have 25,000 credits of debt to navigate, and the salvage barges are already overhead.', delay: 4000, tts: 'The toaster is preheated, Vernon. It is the only thing in this building that produces real texture. Eat your toast. We have 25,000 credits of debt to navigate, and the salvage barges are already overhead.' },
            { text: '', delay: 600, tts: null },
            { text: '&gt; OPERATOR LOGIN REQUIRED', delay: 1200, tts: 'Operator login required.' },
        ];

        // Mark introPlayed in the game-state key so index.html knows intro is done.
        // intro.html only bootstraps introPlayed (and optionally tutorialStep); all other
        // fields are supplied by stateManager._default() in index.html on first load.
        // stateVersion must be >= 7 so stateManager.load() does not discard the state.
        function markIntroPlayed() {
            try {
                var raw = localStorage.getItem(STATE_KEY);
                var state = raw ? JSON.parse(raw) : {};
                state.introPlayed = true;
                if (!state.stateVersion || state.stateVersion < 7) { state.stateVersion = 7; }
                localStorage.setItem(STATE_KEY, JSON.stringify(state));
            } catch (e) {}
        }

        function goToGame() {
            markIntroPlayed();
            window.location.href = 'index.html';
        }

        // TAKE TUTORIAL button — marks intro played, sets tutorialStep=1, goes to game.
        // stateVersion must be >= 7 so stateManager.load() does not discard the state.
        window.takeTutorial = function () {
            try {
                var raw = localStorage.getItem(STATE_KEY);
                var state = raw ? JSON.parse(raw) : {};
                state.introPlayed = true;
                state.tutorialStep = 1;
                if (!state.stateVersion || state.stateVersion < 7) { state.stateVersion = 7; }
                localStorage.setItem(STATE_KEY, JSON.stringify(state));
            } catch (e) {}
            window.location.href = 'index.html';
        };

        // SKIP button — visible during playback, cancels timers and goes straight to game.
        window.skipIntro = function () {
            if (!_running) { return; }
            _running = false;
            _timers.forEach(function (t) { clearTimeout(t); });
            _timers = [];
            if (window.speechSynthesis) { speechSynthesis.cancel(); }
            goToGame();
        };

        // startSequence — runs the timed text reveal and TTS playback.
        // Only called after a user gesture (via beginTransmission) to satisfy
        // the browser requirement for Web Speech API.
        function startSequence() {
            if (_started) { return; }
            _started = true;

            var textEl = document.getElementById('intro-text');
            var btnEl  = document.getElementById('intro-btn');

            // Reveal the SKIP button now that a gesture has occurred.
            if (btnEl) { btnEl.style.display = ''; }

            var accumulated = '';
            var elapsed = 0;
            _running = true;

            INTRO_LINES.forEach(function (line) {
                elapsed += line.delay;
                var t = setTimeout(function () {
                    if (!_running) { return; }
                    if (line.text === '') {
                        accumulated += '<br>';
                    } else {
                        var isTerminal = line.text.indexOf('&gt;') === 0;
                        var style = isTerminal ? ' style="color:var(--text-dim)"' : '';
                        accumulated += '<span' + style + ' class="intro-line-fade">' + line.text + '</span><br>';
                    }
                    textEl.innerHTML = accumulated;
                    if (line.tts && window.OtisTTS && !window.OtisTTS.isMuted()) {
                        OtisTTS.speak(line.tts);
                    }
                }, elapsed);
                _timers.push(t);
            });

            // After all lines finish, change SKIP to OPERATOR LOGIN and wait for user click.
            elapsed += 2000;
            var endT = setTimeout(function () {
                if (!_running) { return; }
                _running = false;
                _timers = [];
                if (btnEl) {
                    btnEl.textContent = 'SKIP TUTORIAL \u25BA';
                    btnEl.classList.add('login-pulse');
                    btnEl.onclick = goToGame;
                } else {
                    goToGame();
                }
                // Show the TAKE TUTORIAL button alongside OPERATOR LOGIN
                var tutBtn = document.getElementById('tutorial-btn');
                if (tutBtn) { tutBtn.style.display = ''; }
                // Show browser-storage warning now that player is about to begin
                var storageWarn = document.getElementById('intro-storage-warn');
                if (storageWarn) { storageWarn.style.display = ''; }
            }, elapsed);
            _timers.push(endT);
        }

        // beginTransmission — called by the overlay button or any keydown.
        // Removes the overlay and starts the sequence (satisfying the user-gesture
        // requirement for Web Speech API).
        window.beginTransmission = function () {
            var overlay = document.getElementById('start-overlay');
            if (overlay) { overlay.style.display = 'none'; }
            startSequence();
        };

        // One-time keydown listener as an alternative to clicking the button.
        window.addEventListener('keydown', function handler() {
            window.removeEventListener('keydown', handler);
            window.beginTransmission();
        });
    }());
    </script>
</body>
</html>
